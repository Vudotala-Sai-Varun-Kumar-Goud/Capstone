<div class="split-layout">
  
  <div class="hero-side">
    <div class="hero-content animate-slide-up">
      <h1>EventMaster Pro.</h1>
      <p>The premium standard in intelligent event management and seamless resource allocation.</p>
    </div>
  </div>

  <div class="form-side">
    <div class="login-card animate-slide-up">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <div *ngIf="showError" class="alert alert-danger">{{ errorMessage }}</div>
      
      <form [formGroup]="itemForm" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Username</label>
          <input type="text" formControlName="username" placeholder="Enter Username">
          <div *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched" class="validation-error">Username is required.</div>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="Enter Password">
          <div *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched" class="validation-error">Password is required.</div>
        </div>
        
        <button type="submit" class="btn login-btn" [disabled]="!itemForm.valid">Log In</button>
      </form>
      
      <div class="login-footer">
        <p>Don't have an account? <a href="javascript:void(0)" (click)="registration()">Create one</a></p>
      </div>
    </div>
  </div>

</div>
